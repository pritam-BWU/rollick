<app-modal [isOpen]="isOpen" title="Add Assignee" (close)="onClose()">
  <div class="add-assignee-content">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" [(ngModel)]="searchTerm" placeholder="Search employees..." class="search-input">
    </div>

    <div class="employee-list">
      <div *ngFor="let emp of filteredEmployees" class="employee-item" (click)="onAssign(emp.name)">
        <span class="name">{{ emp.name }}</span>
      </div>
    </div>
  </div>

  <div footer>
    <button class="btn btn-cancel" (click)="onClose()">Cancel</button>
    <button class="btn btn-primary" (click)="onAssign(searchTerm || 'New Assignee')">Add Assignee</button>
  </div>
</app-modal>
