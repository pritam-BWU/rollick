<div class="header">

  <!-- Left Section (Close Icon, Profile, Date) -->
  <div class="header-left-group">
    <button class="hamburger-btn" *ngIf="isSidebarCollapsed" (click)="onToggleSidebar()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <div class="user-profile-circle">
      <span>A</span>
    </div>

    <div class="badge-pill date-pill">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      <span>{{ currentDate | date:'EEEE, MMMM d, y' }}</span>
    </div>
  </div>

  <!-- Middle Section (Search Bar) -->
  <!-- <div class="search-container">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input type="text" placeholder="Search anything...">
  </div> -->

  <!-- Right Section (Time, Notifications) -->
  <div class="header-right-group">
    <div class="badge-pill time-pill">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <span>{{ currentDate | date:'hh:mm a' }}</span>
    </div>

    <div class="notification-bell-container">
      <div class="notification-bell" (click)="toggle('notifications')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="notif-dot" *ngIf="notifications.length > 0"></span>
      </div>

      <!-- Notification Dropdown -->
      <div class="notif-dropdown" *ngIf="activeDropdown === 'notifications'">
        <div class="notif-header">
          <h3>Notifications</h3>
          <span class="notif-count">{{ notifications.length }} New</span>
        </div>

        <div class="notif-list" *ngIf="notifications.length > 0">
          <div class="notif-item" *ngFor="let n of notifications">
            <div class="notif-icon-box" [ngClass]="n.type">
              {{ n.icon }}
            </div>
            <div class="notif-content">
              <p class="notif-title">{{ n.title }}</p>
              <p class="notif-msg">{{ n.message }}</p>
              <span class="notif-time">{{ n.time }}</span>
            </div>
            <button class="clear-notif" (click)="clearNotification(n.id, $event)">&times;</button>
          </div>
        </div>

        <div class="notif-empty" *ngIf="notifications.length === 0">
          <p>No new notifications</p>
        </div>

        <div class="notif-footer">
          <button>View All Activity</button>
        </div>
      </div>
    </div>
  </div>

</div>
