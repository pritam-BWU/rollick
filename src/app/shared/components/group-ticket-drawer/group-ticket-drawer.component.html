<app-side-drawer [isOpen]="isOpen" title="Create New Ticket|" (close)="onClose()">
  <div class="ticket-form">
    <div class="form-field">
      <label>Ticket Name <span class="required">*</span></label>
      <input type="text" [(ngModel)]="ticketData.name" placeholder="abc">
    </div>

    <div class="form-field">
      <label>Ticket Description</label>
      <textarea [(ngModel)]="ticketData.description" placeholder="Enter ticket description" rows="4"></textarea>
    </div>

    <div class="form-field">
      <label>Ticket Type <span class="required">*</span></label>
      <div class="select-wrapper">
        <select [(ngModel)]="ticketData.type">
          <option>Pass Information</option>
          <option>Quality Control</option>
          <option>Maintenance</option>
        </select>
      </div>
    </div>

    <div class="form-field">
      <label>Priority</label>
      <div class="priority-segmented">
        <button type="button" [class.active]="ticketData.priority === 'low'" (click)="ticketData.priority = 'low'">Low</button>
        <button type="button" [class.active]="ticketData.priority === 'mid'" (click)="ticketData.priority = 'mid'">Mid</button>
        <button type="button" [class.active]="ticketData.priority === 'high'" (click)="ticketData.priority = 'high'">High</button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-field half">
        <label>Start Date</label>
        <div class="input-with-icon">
          <input type="text" value="28 / 04 / 2026" readonly>
          <div class="icons-right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 4H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.89 2 1.99 2H19c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"></path>
            </svg>
          </div>
        </div>
      </div>
      <div class="form-field half">
        <label>End Date</label>
        <div class="input-with-icon">
          <input type="text" value="30 / 04 / 2026" readonly>
          <div class="icons-right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 4H5c-1.1 0-1.99.9-1.99 2L3 20c0 1.1.89 2 1.99 2H19c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM5 8V6h14v2H5z"></path>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <div class="form-field">
      <label>Assign to Group <span class="required">*</span></label>
      <div class="select-wrapper">
        <select [(ngModel)]="ticketData.assignToGroup">
          <option>Production Line Team A (3 members)</option>
        </select>
        <svg class="icon-group-select" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </div>
    </div>

    <div class="group-preview-card">
      <div class="group-header">
        <span class="group-name">Production Line Team A</span>
        <span class="member-count">3 members</span>
      </div>
      <ul class="member-list">
        <li *ngFor="let member of groupMembers">
          <span class="bullet">•</span> {{ member.name }}
        </li>
      </ul>
    </div>
  </div>

  <div footer class="form-footer">
    <button class="btn-cancel" (click)="onClose()">Cancel</button>
    <button class="btn-create" (click)="onCreateTicket()">Create Ticket</button>
  </div>
</app-side-drawer>
