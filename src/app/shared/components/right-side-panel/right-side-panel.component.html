<div class="right-panel">

  <!-- Header -->
  <div class="right-header">
    <span class="right-title">{{ config.title }}</span>
    <input
      type="text"
      class="search-box"
      [placeholder]="config.searchPlaceholder || '🔍 Search...'"
      [(ngModel)]="searchTerm">
  </div>

  <!-- Items List -->
  <div class="product-list">
    <div class="product-item" *ngFor="let item of filteredItems">

      <!-- Status dot (optional) -->
      <div
        *ngIf="item.statusClass"
        class="product-status-dot"
        [ngClass]="item.statusClass">
      </div>

      <!-- Item Info -->
      <div class="product-info">
        <span class="product-name">{{ item.name }}</span>
        <span *ngIf="item.subText" class="product-id">{{ item.subText }}</span>
        <span *ngIf="item.tag" class="product-tag" [ngClass]="item.tagClass">{{ item.tag }}</span>
        <span *ngIf="item.date" class="product-date">📅 {{ item.date }}</span>

        <!-- Extra flexible fields -->
        <div *ngFor="let field of item.extraFields" class="extra-field">
          <span class="extra-label">{{ field.label }}:</span>
          <span class="extra-value">{{ field.value }}</span>
        </div>
      </div>

    </div>

    <!-- Empty state -->
    <div *ngIf="filteredItems.length === 0" class="empty-state">
      No records found.
    </div>
  </div>

  <!-- Add Button (optional) -->
  <button *ngIf="config?.addButtonLabel" class="add-product-btn" (click)="onAddButtonClick()">
    {{ config.addButtonLabel }}
  </button>

</div>
