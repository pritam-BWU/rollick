<div class="toolbar">
  <div class="toolbar-left">
    <div class="search-box" *ngIf="config.showSearch">
      <input type="text" placeholder="Search..." (input)="searched.emit($any($event.target).value)">
    </div>
    <!-- <button class="icon-btn" *ngIf="config.showFilter">🔽</button> -->
    <button class="icon-btn" *ngIf="config.showFilter">
    	<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
	    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
	  	</svg>
    </button>
    <!-- <button class="icon-btn" *ngIf="config.showUpload">⬆</button> -->
    <button class="icon-btn" *ngIf="config.showUpload">
    	<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
	    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
	    <polyline points="17 8 12 3 7 8"/>
	    <line x1="12" y1="3" x2="12" y2="15"/>
  		</svg>
    </button>
    <!-- <button class="icon-btn" *ngIf="config.showDownload">⬇</button> -->
    <button class="icon-btn" *ngIf="config.showDownload">
    	<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
	    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
	    <polyline points="7 10 12 15 17 10"/>
	    <line x1="12" y1="15" x2="12" y2="3"/>
	  </svg>
    </button>
    <!-- <button class="icon-btn" *ngIf="config.showColumnSort">≡</button> -->
    <button class="icon-btn" *ngIf="config.showColumnSort">
    	<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
		    <line x1="8" y1="6" x2="21" y2="6"/>
		    <line x1="8" y1="12" x2="21" y2="12"/>
		    <line x1="8" y1="18" x2="21" y2="18"/>
		    <line x1="3" y1="6" x2="3.01" y2="6"/>
		    <line x1="3" y1="12" x2="3.01" y2="12"/>
		    <line x1="3" y1="18" x2="3.01" y2="18"/>
		</svg>
    </button>
  </div>
  <div class="toolbar-right">
    <button
      *ngFor="let btn of config.buttons"
      [class.btn-primary]="btn.class === 'primary'"
      [class.btn-outline]="btn.class === 'outline'"
      (click)="onButtonClick(btn.action)">
      {{ btn.label }}
    </button>
  </div>
</div>
