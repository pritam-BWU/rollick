<app-side-drawer [isOpen]="isOpen" title="Create New Ticket" (close)="onClose()">
  <div class="ticket-form">
    <!-- Basic Information Section -->
    <div class="form-section">
      <h3>Basic Information</h3>
      
      <div class="form-field">
        <label>Ticket Name <span class="required">*</span></label>
        <input type="text" [(ngModel)]="ticketData.name" placeholder="Enter ticket name">
      </div>

      <div class="form-field">
        <label>Ticket Description</label>
        <textarea [(ngModel)]="ticketData.description" placeholder="Enter ticket description" rows="4"></textarea>
      </div>

      <div class="form-field">
        <label>Ticket Category</label>
        <div class="select-wrapper">
          <select [(ngModel)]="ticketData.category">
            <option value="" disabled selected>Select ticket category</option>
            <option value="quality">Quality Control</option>
            <option value="maintenance">Maintenance</option>
            <option value="safety">Safety Inspection</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Schedule Section -->
    <div class="form-section">
      <h3>Schedule</h3>
      
      <div class="form-row">
        <div class="form-field half">
          <label>Assign Date</label>
          <div class="input-with-icon">
            <input type="date" [(ngModel)]="ticketData.assignDate">
          </div>
        </div>
        <div class="form-field half">
          <label>Ticket End Date</label>
          <div class="input-with-icon">
            <input type="date" [(ngModel)]="ticketData.endDate">
          </div>
        </div>
      </div>
    </div>

    <!-- Assignment Section -->
    <div class="form-section">
      <h3>Assignment</h3>
      
      <div class="form-field">
        <label>Department</label>
        <div class="select-wrapper">
          <select [(ngModel)]="ticketData.department">
            <option value="" disabled selected>Select department</option>
            <option value="sms">SMS</option>
            <option value="maintenance">Maintenance</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label>Assign To</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="assignType" value="individual" [(ngModel)]="ticketData.assignType">
            <span>Individual</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="assignType" value="group" [(ngModel)]="ticketData.assignType">
            <span>Group</span>
          </label>
        </div>
      </div>

      <div class="form-field">
        <div class="input-with-icon">
          <svg class="icon-input" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" [(ngModel)]="ticketData.employee" placeholder="Select employee to add">
        </div>
      </div>
    </div>

    <!-- Ticket Priority Section -->
    <div class="form-section">
      <h3>Ticket Priority</h3>
      <div class="priority-group">
        <button class="priority-btn" (click)="ticketData.priority = 'low'" [class.active]="ticketData.priority === 'low'">Low</button>
        <button class="priority-btn" (click)="ticketData.priority = 'mid'" [class.active]="ticketData.priority === 'mid'">Mid</button>
        <button class="priority-btn" (click)="ticketData.priority = 'high'" [class.active]="ticketData.priority === 'high'">High</button>
      </div>
    </div>
  </div>

  <!-- Footer Actions -->
  <div footer class="form-footer">
    <button class="btn-outline" (click)="saveAsDraft()">Save as Draft</button>
    <button class="btn-primary" (click)="assignNow()">Assign Now</button>
  </div>
</app-side-drawer>
