<div class="overlay" *ngIf="show" (click)="closePopup()"></div>
<div class="account-drawer" [class.open]="show">
  <div class="drawer-header">
    <h2>{{ config.title }}</h2>
    <span class="close-btn" (click)="closePopup()">✕</span>
  </div>

  <div class="drawer-body">
    <ng-container *ngFor="let section of config.sections">

      <!-- Section Header -->
      <div class="section-header" (click)="toggleSection(section.id)">
        <h3>{{ section.title }}</h3>
        <span class="chevron" [class.open]="openSection === section.id">^</span>
      </div>

      <!-- Section Fields -->
      <div class="section-content" [class.expanded]="openSection === section.id">
        <ng-container *ngFor="let field of section.fields">

          <label>{{ field.label }} <span *ngIf="field.required">*</span></label>

          <!-- Text / Email / Number -->
          <input
            *ngIf="field.type !== 'select' && field.type !== 'toggle'"
            [type]="field.type"
            [placeholder]="field.placeholder || ''"
            [(ngModel)]="formData[field.key]"
          >

          <!-- Select -->
          <select *ngIf="field.type === 'select'" [(ngModel)]="formData[field.key]">
            <option value="">{{ field.placeholder || 'Select' }}</option>
            <option *ngFor="let opt of field.options" [value]="opt.value">
              {{ opt.label }}
            </option>
          </select>

          <!-- Toggle -->
          <div *ngIf="field.type === 'toggle'" class="status-toggle">
            <label class="switch">
              <input type="checkbox" [(ngModel)]="formData[field.key]">
              <span class="slider"></span>
            </label>
            <span>{{ formData[field.key] ? 'Active' : 'Inactive' }}</span>
          </div>

        </ng-container>
      </div>

    </ng-container>
  </div>

  <div class="footer-btn">
    <button class="clear-all" (click)="closePopup()">Clear All</button>
    <button class="save" (click)="onSave()">Save</button>
  </div>
</div>
